name: Build Vortex AI APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install
      - name: Build Web
        run: npm run build
      - name: Setup Android Project
        run: |
          npx cap add android
          npx cap copy
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Vortex-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
